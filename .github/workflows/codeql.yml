# `actions` analysis only. The casks are generated Ruby with a DO NOT EDIT
# header; scanning them would report on code this repo cannot fix. The
# workflows are hand-written and hold the GITHUB_TOKEN, so they are the code
# worth scanning here.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:actions
