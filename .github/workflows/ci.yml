# The casks in this repo are generated by GoReleaser from the source project
# and carry a "DO NOT EDIT" header, so they are deliberately NOT linted here:
# `brew style` and `brew audit` both fail on the current generated output, and
# making them required would turn every future release into a red build that
# cannot be fixed from this repo. Fix cask lint at the generator instead.
#
# That leaves the workflows as the only hand-written code, so that is what CI
# checks.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: actionlint -color
